spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: alert-hound
  data:
    redis:
      host: ${ALERT_HOUND_REDIS_HOST:localhost}
      port: ${ALERT_HOUND_REDIS_PORT:6379}
      username: ${ALERT_HOUND_REDIS_USERNAME:}
      password: ${ALERT_HOUND_REDIS_PASSWORD:}
      ssl:
        enabled: ${ALERT_HOUND_REDIS_SSL_ENABLED:false}
  datasource:
    url: ${ALERT_HOUND_DATASOURCE_URL:jdbc:h2:mem:alerthound;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${ALERT_HOUND_DATASOURCE_USERNAME:sa}
    password: ${ALERT_HOUND_DATASOURCE_PASSWORD:}
    driver-class-name: ${ALERT_HOUND_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: ${ALERT_HOUND_JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: ${ALERT_HOUND_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    client-id: ${ALERT_HOUND_KAFKA_CLIENT_ID:alert-hound}
    consumer:
      group-id: ${ALERT_HOUND_KAFKA_CONSUMER_GROUP_ID:log-processor-group}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.incident.alerthound.logingestion.model.LogEvent
        spring.json.trusted.packages: com.incident.alerthound.*
        isolation.level: read_committed
    listener:
      ack-mode: manual_immediate
      concurrency: ${ALERT_HOUND_KAFKA_LISTENER_CONCURRENCY:3}
    producer:
      acks: 1
      retries: 3
      batch-size: 32768
      linger-ms: 5
      compression-type: snappy
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    properties:
      session.timeout.ms: 45000
      security.protocol: ${ALERT_HOUND_KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${ALERT_HOUND_KAFKA_SASL_MECHANISM:}
      sasl.jaas.config: ${ALERT_HOUND_KAFKA_SASL_JAAS_CONFIG:}
server:
  port: ${SERVER_PORT:8080}

alert-hound:
  kafka:
    cluster-id: ${ALERT_HOUND_KAFKA_CLUSTER_ID:}
    rest-endpoint: ${ALERT_HOUND_KAFKA_REST_ENDPOINT:}
    admin:
      auto-create-topics: ${ALERT_HOUND_KAFKA_AUTO_CREATE_TOPICS:false}
    topics:
      logs-raw:
        name: ${ALERT_HOUND_KAFKA_TOPIC_LOGS_RAW:logs.raw}
        partitions: ${ALERT_HOUND_KAFKA_TOPIC_LOGS_RAW_PARTITIONS:3}
        replication-factor: ${ALERT_HOUND_KAFKA_TOPIC_LOGS_RAW_REPLICATION_FACTOR:1}
      logs-processed:
        name: ${ALERT_HOUND_KAFKA_TOPIC_LOGS_PROCESSED:logs.processed}
        partitions: ${ALERT_HOUND_KAFKA_TOPIC_LOGS_PROCESSED_PARTITIONS:3}
        replication-factor: ${ALERT_HOUND_KAFKA_TOPIC_LOGS_PROCESSED_REPLICATION_FACTOR:1}
      incidents-created:
        name: ${ALERT_HOUND_KAFKA_TOPIC_INCIDENTS_CREATED:incidents.created}
        partitions: ${ALERT_HOUND_KAFKA_TOPIC_INCIDENTS_CREATED_PARTITIONS:3}
        replication-factor: ${ALERT_HOUND_KAFKA_TOPIC_INCIDENTS_CREATED_REPLICATION_FACTOR:1}
      agent-tasks:
        name: ${ALERT_HOUND_KAFKA_TOPIC_AGENT_TASKS:agent.tasks}
        partitions: ${ALERT_HOUND_KAFKA_TOPIC_AGENT_TASKS_PARTITIONS:3}
        replication-factor: ${ALERT_HOUND_KAFKA_TOPIC_AGENT_TASKS_REPLICATION_FACTOR:1}
      agent-results:
        name: ${ALERT_HOUND_KAFKA_TOPIC_AGENT_RESULTS:agent.results}
        partitions: ${ALERT_HOUND_KAFKA_TOPIC_AGENT_RESULTS_PARTITIONS:3}
        replication-factor: ${ALERT_HOUND_KAFKA_TOPIC_AGENT_RESULTS_REPLICATION_FACTOR:1}
  elasticsearch:
    endpoint: ${ALERT_HOUND_ELASTICSEARCH_ENDPOINT:}
    api-key: ${ALERT_HOUND_ELASTICSEARCH_API_KEY:}
    logs-index-pattern: ${ALERT_HOUND_ELASTICSEARCH_LOGS_INDEX_PATTERN:logs-*}
  detection:
    consumer-group-id: ${ALERT_HOUND_DETECTION_CONSUMER_GROUP_ID:detection-group}
    window-size-minutes: ${ALERT_HOUND_DETECTION_WINDOW_SIZE_MINUTES:2}
    counter-ttl-minutes: ${ALERT_HOUND_DETECTION_COUNTER_TTL_MINUTES:10}
    dedup-ttl-minutes: ${ALERT_HOUND_DETECTION_DEDUP_TTL_MINUTES:5}
    minimum-total-logs: ${ALERT_HOUND_DETECTION_MINIMUM_TOTAL_LOGS:100}
    error-rate-threshold: ${ALERT_HOUND_DETECTION_ERROR_RATE_THRESHOLD:0.05}
  incidents:
    consumer-group-id: ${ALERT_HOUND_INCIDENTS_CONSUMER_GROUP_ID:incident-group}
    active-cache-ttl-hours: ${ALERT_HOUND_INCIDENTS_ACTIVE_CACHE_TTL_HOURS:24}
  agent:
    consumer-group-id: ${ALERT_HOUND_AGENT_CONSUMER_GROUP_ID:agent-group}
    max-iterations: ${ALERT_HOUND_AGENT_MAX_ITERATIONS:3}
    recent-logs-limit: ${ALERT_HOUND_AGENT_RECENT_LOGS_LIMIT:20}
    history-limit: ${ALERT_HOUND_AGENT_HISTORY_LIMIT:5}
    log-lookback-minutes: ${ALERT_HOUND_AGENT_LOG_LOOKBACK_MINUTES:5}
