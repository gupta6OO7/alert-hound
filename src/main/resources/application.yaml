spring:
  application:
    name: alert-hound
  kafka:
    bootstrap-servers: ${ALERT_HOUND_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    client-id: ${ALERT_HOUND_KAFKA_CLIENT_ID:alert-hound}
    producer:
      acks: 1
      retries: 3
      batch-size: 32768
      linger-ms: 5
      compression-type: snappy
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    properties:
      security.protocol: ${ALERT_HOUND_KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${ALERT_HOUND_KAFKA_SASL_MECHANISM:}
      sasl.jaas.config: ${ALERT_HOUND_KAFKA_SASL_JAAS_CONFIG:}

server:
  port: ${SERVER_PORT:8080}

alert-hound:
  kafka:
    cluster-id: ${ALERT_HOUND_KAFKA_CLUSTER_ID:}
    rest-endpoint: ${ALERT_HOUND_KAFKA_REST_ENDPOINT:}
    admin:
      auto-create-topics: ${ALERT_HOUND_KAFKA_AUTO_CREATE_TOPICS:false}
    topics:
      logs-raw:
        name: ${ALERT_HOUND_KAFKA_TOPIC_LOGS_RAW:logs.raw}
        partitions: ${ALERT_HOUND_KAFKA_TOPIC_LOGS_RAW_PARTITIONS:3}
        replication-factor: ${ALERT_HOUND_KAFKA_TOPIC_LOGS_RAW_REPLICATION_FACTOR:1}
  elasticsearch:
    endpoint: ${ALERT_HOUND_ELASTICSEARCH_ENDPOINT:}
    api-key: ${ALERT_HOUND_ELASTICSEARCH_API_KEY:}
    logs-index-pattern: ${ALERT_HOUND_ELASTICSEARCH_LOGS_INDEX_PATTERN:logs-*}
